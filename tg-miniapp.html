<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOC° delivery</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0a; --card:#121512; --line:#23272300; --line2:#222; --green:#1e7a45; --green2:#2ea35c;
    --ink:#fff; --muted:#8b938d; --radius:20px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--ink)}
  body{font-family:'Inter',sans-serif;padding-bottom:30px;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:none;color:inherit}
  .wrap{max-width:600px;margin:0 auto;padding:0 16px;position:relative;z-index:1}
  .mono{font-family:'JetBrains Mono',monospace}

  /* живой фон со вспышками света */
  .bgfx{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .orb{position:absolute;border-radius:50%;filter:blur(70px);mix-blend-mode:screen;will-change:transform,opacity}
  .orb.a{width:280px;height:280px;background:#1e7a45;top:-70px;left:-50px;animation:driftA 16s ease-in-out infinite, pulse 7s ease-in-out infinite}
  .orb.b{width:230px;height:230px;background:#2ea35c;top:24%;right:-70px;animation:driftB 19s ease-in-out infinite, pulse 9s ease-in-out infinite .8s}
  .orb.c{width:200px;height:200px;background:#13653a;bottom:14%;left:-60px;animation:driftC 22s ease-in-out infinite, pulse 8s ease-in-out infinite .4s}
  .orb.d{width:160px;height:160px;background:#2ea35c;bottom:-50px;right:18%;animation:driftA 18s ease-in-out infinite 1.2s, pulse 6s ease-in-out infinite}
  /* редкая яркая вспышка */
  .flash{position:absolute;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,#5effa0,transparent 70%);filter:blur(30px);mix-blend-mode:screen;opacity:0}
  .flash.f1{top:18%;left:30%;animation:flash 11s ease-in-out infinite 2s}
  .flash.f2{top:60%;right:22%;animation:flash 13s ease-in-out infinite 7s}
  .flash.f3{top:40%;left:55%;animation:flash 17s ease-in-out infinite 12s}
  @keyframes pulse{0%,100%{opacity:.07}50%{opacity:.20}}
  @keyframes driftA{0%,100%{transform:translate(0,0)}50%{transform:translate(46px,34px)}}
  @keyframes driftB{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,40px)}}
  @keyframes driftC{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-36px)}}
  @keyframes flash{0%,90%,100%{opacity:0;transform:scale(.6)}94%{opacity:.5;transform:scale(1)}97%{opacity:.15;transform:scale(1.1)}}
  @media(prefers-reduced-motion:reduce){.orb,.flash{animation:none}}
  h1,h2,h3,.u{font-family:'Unbounded',sans-serif}

  /* top */
  .top{display:flex;align-items:center;padding:16px 2px 6px}
  .brand{font-family:'Unbounded';font-weight:900;font-size:20px;letter-spacing:-.3px}
  .brand .dot{color:var(--green2)}
  .addr{margin-left:auto;font-family:'JetBrains Mono';font-size:11px;color:var(--muted);text-align:right;line-height:1.35}
  .addr b{color:#fff;display:block;font-size:12px;font-weight:700}

  .hello{font-family:'Unbounded';font-weight:700;font-size:24px;letter-spacing:-.5px;margin:14px 2px 2px}
  .hello span{color:var(--green2)}
  .helsub{color:var(--muted);font-size:13px;margin:0 2px 18px}

  .sechead{font-family:'JetBrains Mono';font-size:11px;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin:18px 2px 12px}

  /* restaurant cards */
  .rcard{background:var(--card);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;cursor:pointer;transition:transform .12s}
  .rcard:active{transform:scale(.985)}
  .rphoto{height:150px;background-size:cover;background-position:center;position:relative;display:flex;align-items:flex-end}
  .rphoto .fade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.75))}
  .rphoto .init{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Unbounded';font-weight:900;font-size:64px;color:rgba(255,255,255,.10)}
  .rphoto .tag{position:relative;margin:0 0 12px 14px;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);color:#fff;font-family:'JetBrains Mono';font-size:11px;padding:5px 11px;border-radius:999px}
  .rbody{padding:13px 16px 16px;display:flex;align-items:center;gap:10px}
  .rname{font-family:'Unbounded';font-weight:700;font-size:18px;letter-spacing:-.3px}
  .rmeta{font-family:'JetBrains Mono';font-size:11px;color:var(--muted);margin-top:4px;display:flex;gap:10px}
  .rmeta .st{color:var(--green2);font-weight:700}
  .rgo{margin-left:auto;color:var(--muted);font-size:22px}

  /* restaurant page */
  .back{display:inline-flex;align-items:center;gap:7px;background:var(--card);padding:9px 15px;border-radius:999px;font-family:'JetBrains Mono';font-size:12px;color:#b9c2bc;margin:10px 0 4px}
  .rhead{margin:8px 0 14px}
  .rhead h2{margin:0;font-size:26px;letter-spacing:-.6px}
  .rhead .m{font-family:'JetBrains Mono';font-size:12px;color:var(--muted);margin-top:6px;display:flex;gap:14px}
  .rhead .m .st{color:var(--green2);font-weight:700}

  .cats{display:flex;gap:8px;overflow-x:auto;padding:4px 0 14px;scrollbar-width:none;position:sticky;top:0;background:var(--bg);z-index:10}
  .cats::-webkit-scrollbar{display:none}
  .cat{flex:0 0 auto;padding:9px 15px;border-radius:999px;background:var(--card);color:#b9c2bc;font-size:13px;font-weight:600}
  .cat.on{background:var(--green);color:#fff}

  .catsec h3{font-size:17px;letter-spacing:-.3px;margin:14px 2px 12px}

  /* dish grid — big cards with photo + big button */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:380px){.grid{grid-template-columns:1fr}}
  .dish{background:var(--card);border-radius:18px;overflow:hidden;display:flex;flex-direction:column}
  .dphoto{height:128px;background-size:cover;background-position:center;position:relative;display:flex;align-items:center;justify-content:center}
  .dphoto .init{font-family:'Unbounded';font-weight:900;font-size:40px;color:rgba(255,255,255,.08)}
  .dbody{padding:12px 13px 14px;display:flex;flex-direction:column;flex:1}
  .dn{font-size:14px;font-weight:600;line-height:1.25}
  .dd{font-size:12px;color:var(--muted);margin:3px 0 0;line-height:1.3;flex:1}
  .dw{font-family:'JetBrains Mono';font-size:11px;color:#6f786f;margin-top:6px}
  .dprice{font-family:'JetBrains Mono';font-weight:700;font-size:17px;margin:10px 0 0}
  .addbig{width:100%;padding:12px;border-radius:12px;background:var(--green);color:#fff;font-weight:700;font-size:14px;font-family:'JetBrains Mono';margin-top:10px}
  .addbig:active{background:var(--green2)}
  .bigstp{display:flex;align-items:center;justify-content:space-between;width:100%;margin-top:10px;background:var(--green);border-radius:12px;padding:4px}
  .bigstp button{width:46px;height:40px;border-radius:9px;background:rgba(0,0,0,.22);font-size:20px;font-weight:700}
  .bigstp span{font-family:'JetBrains Mono';font-weight:700;font-size:16px}

  /* sheet */
  .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;display:none}
  .sheet-bg.on{display:block}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:101;background:#0e110e;border-radius:22px 22px 0 0;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:.25s;max-width:600px;margin:0 auto}
  .sheet.on{transform:translateY(0)}
  .sheet-h{position:sticky;top:0;background:#0e110e;padding:18px 18px 8px;display:flex;align-items:center}
  .sheet-h b{font-size:18px;font-family:'Unbounded';letter-spacing:-.3px}
  .sheet-h .x{margin-left:auto;width:34px;height:34px;border-radius:50%;background:var(--card);font-size:17px}
  .sheet-body{padding:0 18px calc(26px + env(safe-area-inset-bottom))}
  .li{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:14px;padding:10px 12px;margin-bottom:8px}
  .li .lph{width:44px;height:44px;border-radius:10px;background-size:cover;background-position:center;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-family:'Unbounded';font-weight:900;color:rgba(255,255,255,.12)}
  .li .info{flex:1;min-width:0}
  .li .n{font-weight:600;font-size:14px}
  .li .p{font-family:'JetBrains Mono';font-size:12px;color:var(--muted)}
  .ministp{display:flex;align-items:center;gap:5px;background:var(--green);border-radius:11px;padding:3px;flex:0 0 auto}
  .ministp button{width:30px;height:32px;border-radius:8px;background:rgba(0,0,0,.22);font-size:17px;font-weight:700}
  .ministp span{font-family:'JetBrains Mono';font-weight:700;min-width:16px;text-align:center}
  .field{width:100%;padding:13px 14px;border-radius:13px;border:1px solid #2a2f2a;background:var(--card);color:#fff;font-size:15px;margin-bottom:10px;font-family:'Inter'}
  .field::placeholder{color:#646b64}
  .pay{display:flex;gap:8px;margin-bottom:12px}
  .pay button{flex:1;padding:12px;border-radius:13px;background:var(--card);border:1px solid #2a2f2a;font-weight:600;font-size:14px;color:#b9c2bc}
  .pay button.on{border-color:var(--green2);color:#fff;background:#13251a}
  .summary{background:var(--card);border-radius:14px;padding:14px;margin-bottom:6px;font-family:'JetBrains Mono';font-size:13px}
  .summary .r{display:flex;justify-content:space-between;padding:4px 0;color:#b9c2bc}
  .summary .r.total{font-weight:700;font-size:17px;color:#fff;border-top:1px solid #262b26;margin-top:6px;padding-top:9px}
  .hint{font-size:12px;margin:2px 2px 11px;font-family:'JetBrains Mono'}

  .fakebtn{position:fixed;left:0;right:0;bottom:0;z-index:90;max-width:600px;margin:0 auto;padding:10px 16px calc(10px + env(safe-area-inset-bottom));display:none}
  .fakebtn.on{display:block}
  .fakebtn button{width:100%;padding:16px;border-radius:14px;background:var(--green);color:#fff;font-weight:700;font-size:15px;font-family:'JetBrains Mono'}

  .done{text-align:center;padding:60px 18px}
  .done .big{font-family:'Unbounded';font-weight:900;font-size:30px;color:var(--green2)}
  .done h2{font-size:20px;margin:16px 0 6px;letter-spacing:-.3px}
  .done p{color:var(--muted);font-size:14px}
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:#fff;color:#0a0a0a;padding:12px 17px;border-radius:12px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:.25s;pointer-events:none;font-family:'Inter';text-align:center;max-width:88%}
  .toast.on{opacity:1}
</style>
</head>
<body>
<div class="bgfx" aria-hidden="true">
  <div class="orb a"></div><div class="orb b"></div><div class="orb c"></div><div class="orb d"></div>
  <div class="flash f1"></div><div class="flash f2"></div><div class="flash f3"></div>
</div>
<div class="wrap">
  <div class="top">
    <div class="brand">SOC<span class="dot">°</span> delivery</div>
    <div class="addr">Доставка<b>Олёкминск</b></div>
  </div>

  <div id="home">
    <div class="hello">Что закажем <span>сегодня</span>?</div>
    <div class="helsub">Заведения Олёкминска · доставка 30–40 минут</div>
    <div class="sechead">Заведения · порядок случайный 🔀</div>
    <div id="rlist"></div>
  </div>

  <div id="menu" style="display:none">
    <button class="back" onclick="goHome()">← Заведения</button>
    <div class="rhead" id="rhead"></div>
    <div class="cats" id="cats"></div>
    <div id="mlist"></div>
  </div>

  <div id="done" style="display:none" class="done">
    <div class="big">SOC°</div>
    <h2 id="done-id">Заказ принят</h2>
    <p id="done-txt"></p>
    <button class="back" style="margin-top:20px" onclick="goHome()">← В меню</button>
  </div>
</div>

<div class="sheet-bg" id="sheet-bg" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-h"><b id="sheet-title">Корзина</b><button class="x" onclick="closeSheet()">✕</button></div>
  <div class="sheet-body" id="sheet-body"></div>
</div>

<div class="fakebtn" id="fakebtn"><button id="fakebtn-b" onclick="mainAction()"></button></div>
<div class="toast" id="toast"></div>

<script>
/* ---------------- TELEGRAM ---------------- */
const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
const inTG = !!(tg && tg.initData !== undefined && tg.platform && tg.platform!=='unknown');
if(tg){ tg.ready(); tg.expand(); try{tg.setHeaderColor('#0a0a0a'); tg.setBackgroundColor('#0a0a0a');}catch(e){} }
function haptic(t='light'){ try{ if(tg&&tg.HapticFeedback) tg.HapticFeedback.impactOccurred(t);}catch(e){} }
function notify(t='success'){ try{ if(tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred(t);}catch(e){} }

/* ---------------- DATA ----------------
   Чтобы добавить фото: положи файл в папку img/ в репозитории
   и впиши путь в поле img, например img:'img/burger.jpg'.
   Пока img пустой — показывается фирменная заглушка с буквой.            */
const STORES=[
 {id:'meced',  name:'Кафе «Месед»', tag:'Кавказская кухня',    rating:4.8, time:'30–40', min:500, cov:'#1a2c20', img:''},
 {id:'shur',   name:'ЩурБургер',    tag:'Бургеры',             rating:4.9, time:'25–35', min:500, cov:'#2c2113', img:''},
 {id:'tochka', name:'Точка',        tag:'Шаурма и стрит-фуд',  rating:4.7, time:'20–30', min:400, cov:'#2a1717', img:''},
 {id:'shahri', name:'Шахиризада',   tag:'Восточная кухня',     rating:4.8, time:'35–45', min:600, cov:'#231a2c', img:''},
];
const PRODUCTS=[
 // Кафе «Месед»
 {id:101,s:'meced',c:'Горячее',n:'Хинкал даргинский',d:'с бараниной и чесночным соусом',w:'350 г',p:380,img:''},
 {id:102,s:'meced',c:'Горячее',n:'Чуду с мясом',d:'тонкая лепёшка с сочной начинкой',w:'200 г',p:160,img:''},
 {id:103,s:'meced',c:'Горячее',n:'Шашлык из баранины',d:'на углях',w:'250 г',p:520,img:''},
 {id:104,s:'meced',c:'Горячее',n:'Долма',d:'виноградные листья, мясо, рис',w:'200 г',p:340,img:''},
 {id:105,s:'meced',c:'Супы',n:'Хаш',d:'наваристый, по-кавказски',w:'400 мл',p:390,img:''},
 {id:106,s:'meced',c:'Супы',n:'Чихиртма',d:'куриный суп с зеленью',w:'350 мл',p:320,img:''},
 {id:107,s:'meced',c:'Напитки',n:'Айран',d:'',w:'300 мл',p:90,img:''},
 {id:108,s:'meced',c:'Напитки',n:'Компот',d:'из сухофруктов',w:'300 мл',p:80,img:''},
 // ЩурБургер
 {id:201,s:'shur',c:'Бургеры',n:'ЩурБургер',d:'фирменный, говядина на углях',w:'320 г',p:360,img:''},
 {id:202,s:'shur',c:'Бургеры',n:'Чизбургер',d:'двойной чеддер',w:'300 г',p:320,img:''},
 {id:203,s:'shur',c:'Бургеры',n:'Двойной',d:'две котлеты, двойной сыр',w:'440 г',p:480,img:''},
 {id:204,s:'shur',c:'Бургеры',n:'Чикенбургер',d:'хрустящая курица',w:'290 г',p:300,img:''},
 {id:205,s:'shur',c:'Закуски',n:'Картофель фри',d:'',w:'120 г',p:140,img:''},
 {id:206,s:'shur',c:'Закуски',n:'Наггетсы',d:'с соусом на выбор',w:'6 шт',p:190,img:''},
 {id:207,s:'shur',c:'Закуски',n:'Луковые кольца',d:'',w:'140 г',p:170,img:''},
 {id:208,s:'shur',c:'Напитки',n:'Лимонад',d:'домашний',w:'400 мл',p:130,img:''},
 {id:209,s:'shur',c:'Напитки',n:'Милкшейк',d:'',w:'400 мл',p:210,img:''},
 // Точка
 {id:301,s:'tochka',c:'Шаурма',n:'Шаурма классик',d:'курица, овощи, фирменный соус',w:'320 г',p:260,img:''},
 {id:302,s:'tochka',c:'Шаурма',n:'Шаурма XL',d:'двойная порция',w:'450 г',p:330,img:''},
 {id:303,s:'tochka',c:'Шаурма',n:'Шаурма с говядиной',d:'',w:'320 г',p:300,img:''},
 {id:304,s:'tochka',c:'Шаурма',n:'Фалафель',d:'веган',w:'300 г',p:240,img:''},
 {id:305,s:'tochka',c:'Сэндвичи',n:'Сэндвич с курицей',d:'',w:'220 г',p:220,img:''},
 {id:306,s:'tochka',c:'Сэндвичи',n:'Хот-дог',d:'',w:'180 г',p:160,img:''},
 {id:307,s:'tochka',c:'Напитки',n:'Кофе',d:'',w:'300 мл',p:150,img:''},
 {id:308,s:'tochka',c:'Напитки',n:'Лимонад',d:'',w:'400 мл',p:130,img:''},
 // Шахиризада
 {id:401,s:'shahri',c:'Плов и горячее',n:'Плов узбекский',d:'с бараниной',w:'350 г',p:340,img:''},
 {id:402,s:'shahri',c:'Плов и горячее',n:'Лагман',d:'ручная лапша',w:'400 г',p:360,img:''},
 {id:403,s:'shahri',c:'Плов и горячее',n:'Манты',d:'',w:'4 шт',p:300,img:''},
 {id:404,s:'shahri',c:'Выпечка',n:'Самса с мясом',d:'из тандыра',w:'1 шт',p:120,img:''},
 {id:405,s:'shahri',c:'Выпечка',n:'Самса с тыквой',d:'',w:'1 шт',p:110,img:''},
 {id:406,s:'shahri',c:'Выпечка',n:'Лепёшка',d:'тандырная',w:'1 шт',p:60,img:''},
 {id:407,s:'shahri',c:'Напитки',n:'Чай зелёный',d:'чайник',w:'600 мл',p:150,img:''},
 {id:408,s:'shahri',c:'Напитки',n:'Айран',d:'',w:'300 мл',p:90,img:''},
];
const FEE=149, FREE_FROM=1500;

/* ---------------- STATE ---------------- */
let curStore=null, curCat='all', cart={}, cartStore=null, sheetOpen=false, pay='card';

/* ---------------- HELPERS ---------------- */
const $=id=>document.getElementById(id);
const money=v=>v.toLocaleString('ru-RU')+' ₽';
const prod=id=>PRODUCTS.find(p=>p.id===id);
const storeOf=id=>STORES.find(s=>s.id===id);
const cnt=()=>Object.values(cart).reduce((a,b)=>a+b,0);
const total=()=>Object.entries(cart).reduce((a,[id,q])=>a+prod(+id).p*q,0);
const letter=s=>(s||'?').trim().replace(/[«"]/g,'').charAt(0).toUpperCase();
function toast(t){const e=$('toast');e.innerHTML=t;e.classList.add('on');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('on'),2200);}
function confirmSwap(msg,cb){ if(tg&&tg.showConfirm){tg.showConfirm(msg,ok=>{if(ok)cb();});} else { if(confirm(msg))cb(); } }
function photo(img,cov,cls,init){
  if(img) return `<div class="${cls}" style="background-image:url('${img}')"></div>`;
  return `<div class="${cls}" style="background:radial-gradient(120% 120% at 30% 20%, ${cov}, #0c0e0c)"><span class="init">${init}</span></div>`;
}

/* ---------------- HOME ---------------- */
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function renderHome(){
  $('rlist').innerHTML=shuffle(STORES).map(s=>`
    <div class="rcard" onclick="openStore('${s.id}')">
      <div class="rphoto" style="${s.img?`background-image:url('${s.img}')`:`background:radial-gradient(120% 120% at 25% 15%, ${s.cov}, #0c0e0c)`}">
        ${s.img?'':`<div class="init">${letter(s.name)}</div>`}
        <div class="fade"></div>
        <div class="tag">${s.tag}</div>
      </div>
      <div class="rbody">
        <div>
          <div class="rname">${s.name}</div>
          <div class="rmeta"><span class="st">★ ${s.rating}</span><span>${s.time} мин</span><span>от ${s.min} ₽</span></div>
        </div>
        <div class="rgo">→</div>
      </div>
    </div>`).join('');
}
function openStore(id){haptic();curStore=id;curCat='all';
  $('home').style.display='none';$('done').style.display='none';$('menu').style.display='block';
  window.scrollTo(0,0);renderRhead();renderCats();renderMenu();updateNav();
}
function goHome(){haptic();curStore=null;
  $('menu').style.display='none';$('done').style.display='none';$('home').style.display='block';
  window.scrollTo(0,0);updateNav();
}
function renderRhead(){const s=storeOf(curStore);
  $('rhead').innerHTML=`<h2>${s.name}</h2>
    <div class="m"><span class="st">★ ${s.rating}</span><span>${s.time} мин</span><span>мин. заказ ${s.min} ₽</span></div>`;
}
function renderCats(){const cats=['all',...new Set(PRODUCTS.filter(p=>p.s===curStore).map(p=>p.c))];
  $('cats').innerHTML=cats.map(c=>`<div class="cat ${c===curCat?'on':''}" onclick="pickCat('${c}')">${c==='all'?'Всё меню':c}</div>`).join('');
}
function pickCat(c){haptic();curCat=c;renderCats();renderMenu();}
function renderMenu(){
  const cats=curCat==='all'?[...new Set(PRODUCTS.filter(p=>p.s===curStore).map(p=>p.c))]:[curCat];
  $('mlist').innerHTML=cats.map(cat=>{
    const list=PRODUCTS.filter(p=>p.s===curStore&&p.c===cat);
    return `<div class="catsec"><h3>${cat}</h3><div class="grid">${list.map(dishCard).join('')}</div></div>`;
  }).join('');
}
function dishCard(p){
  const q=cart[p.id]||0;
  const cov=storeOf(p.s).cov;
  const ctrl=q>0
    ? `<div class="bigstp"><button onclick="chg(${p.id},-1)">−</button><span>${q} шт</span><button onclick="chg(${p.id},1)">+</button></div>`
    : `<button class="addbig" onclick="chg(${p.id},1)">＋ ${money(p.p)}</button>`;
  return `<div class="dish">
    ${photo(p.img,cov,'dphoto',letter(p.n))}
    <div class="dbody">
      <div class="dn">${p.n}</div>
      <div class="dd">${p.d||''}</div>
      <div class="dw">${p.w}</div>
      ${ctrl}
    </div></div>`;
}
function chg(id,d){const p=prod(id);haptic();
  if(d>0&&cartStore&&cartStore!==p.s&&cnt()>0){
    confirmSwap('В корзине заказ из «'+storeOf(cartStore).name+'». Очистить и начать заново?',()=>{cart={};cart[id]=1;cartStore=p.s;afterChg();});
    return;
  }
  cart[id]=(cart[id]||0)+d; if(cart[id]<=0) delete cart[id];
  cartStore=cnt()>0?p.s:null; afterChg();
}
function afterChg(){if($('menu').style.display!=='none')renderMenu();if(sheetOpen)renderSheet();updateNav();}

/* ---------------- SHEET ---------------- */
function openSheet(){if(cnt()===0)return;haptic();sheetOpen=true;renderSheet();
  $('sheet-bg').classList.add('on');$('sheet').classList.add('on');updateNav();}
function closeSheet(){sheetOpen=false;$('sheet-bg').classList.remove('on');$('sheet').classList.remove('on');updateNav();}
function renderSheet(){
  if(cnt()===0){closeSheet();return;}
  const st=storeOf(cartStore);
  const items=Object.entries(cart).map(([id,q])=>{const p=prod(+id);const cov=storeOf(p.s).cov;
    const lph=p.img?`style="background-image:url('${p.img}')"`:`style="background:radial-gradient(120% 120% at 30% 20%, ${cov}, #0c0e0c)"`;
    return `<div class="li"><div class="lph" ${lph}>${p.img?'':letter(p.n)}</div>
      <div class="info"><div class="n">${p.n}</div><div class="p">${money(p.p)} · ${p.w}</div></div>
      <div class="ministp"><button onclick="chg(${p.id},-1)">−</button><span>${q}</span><button onclick="chg(${p.id},1)">+</button></div></div>`;}).join('');
  const sub=total(), fee=sub>=FREE_FROM?0:FEE, belowMin=sub<st.min;
  const hint=belowMin?`<div class="hint" style="color:#ff7070">До минимального заказа ещё ${money(st.min-sub)}</div>`
    :(sub<FREE_FROM?`<div class="hint" style="color:var(--muted)">До бесплатной доставки ${money(FREE_FROM-sub)}</div>`:'');
  $('sheet-title').textContent=st.name;
  $('sheet-body').innerHTML=`${items}${hint}
    <input class="field" id="f-name" placeholder="Имя" value="${tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user?tg.initDataUnsafe.user.first_name||'':''}">
    <input class="field" id="f-phone" placeholder="Телефон" inputmode="tel">
    <input class="field" id="f-addr" placeholder="Адрес доставки" value="Олёкминск, ">
    <input class="field" id="f-note" placeholder="Комментарий курьеру (необязательно)">
    <div class="pay"><button class="${pay==='card'?'on':''}" onclick="setPay('card')">💳 Картой</button>
      <button class="${pay==='cash'?'on':''}" onclick="setPay('cash')">💵 Наличными</button></div>
    <div class="summary"><div class="r"><span>Блюда</span><span>${money(sub)}</span></div>
      <div class="r"><span>Доставка</span><span>${fee===0?'Бесплатно':money(fee)}</span></div>
      <div class="r total"><span>Итого</span><span>${money(sub+fee)}</span></div></div>`;
}
function setPay(p){haptic();pay=p;renderSheet();}

/* ---------------- NAV / MAIN BUTTON ---------------- */
function mainAction(){ if(sheetOpen) placeOrder(); else openSheet(); }
function updateNav(){
  const c=cnt(), sub=total();
  if(tg&&tg.BackButton){ (sheetOpen||curStore)?tg.BackButton.show():tg.BackButton.hide(); }
  let label='', show=false, color='#1e7a45';
  if(sheetOpen && c>0){
    const st=storeOf(cartStore), fee=sub>=FREE_FROM?0:FEE, below=sub<st.min;
    show=true; label=below?'ДОБЕРИ ДО '+money(st.min):'ЗАКАЗАТЬ · '+money(sub+fee); color=below?'#555':'#1e7a45';
  } else if(c>0 && !sheetOpen){ show=true; label='КОРЗИНА · '+money(sub); }
  if(tg&&tg.MainButton){
    if(show){tg.MainButton.setParams({text:label,color:color,text_color:'#ffffff',is_active:true});tg.MainButton.show();}
    else tg.MainButton.hide();
  }
  const fb=$('fakebtn');
  if(!inTG && show){fb.classList.add('on');$('fakebtn-b').textContent=label;$('fakebtn-b').style.background=color;}
  else fb.classList.remove('on');
}

/* ---------------- ORDER ---------------- */
function placeOrder(){
  const st=storeOf(cartStore), sub=total();
  if(sub<st.min){toast('Добери до минимального заказа');notify('error');return;}
  const name=($('f-name')?.value||'').trim(), phone=($('f-phone')?.value||'').trim(), addr=($('f-addr')?.value||'').trim();
  if(!name||phone.length<5||addr.length<8){toast('Заполни имя, телефон и адрес');notify('error');return;}
  const fee=sub>=FREE_FROM?0:FEE;
  const order={type:'order', store:cartStore, store_name:st.name,
    items:Object.entries(cart).map(([id,q])=>({id:+id,name:prod(+id).n,qty:q,price:prod(+id).p})),
    name, phone, addr, note:($('f-note')?.value||'').trim(), pay, subtotal:sub, fee, total:sub+fee};
  notify('success');
  if(inTG && tg.sendData){ tg.sendData(JSON.stringify(order)); return; }
  const oid='#'+Math.floor(2000+Math.random()*8000);
  cart={};cartStore=null;sheetOpen=false;
  $('sheet-bg').classList.remove('on');$('sheet').classList.remove('on');
  $('home').style.display='none';$('menu').style.display='none';$('done').style.display='block';
  $('done-id').textContent='Заказ '+oid+' принят';
  $('done-txt').textContent=st.name+' · '+money(order.total)+' · доставим за '+st.time+' мин';
  updateNav();window.scrollTo(0,0);
}

/* ---------------- WIRE TELEGRAM ---------------- */
if(tg){
  if(tg.MainButton) tg.MainButton.onClick(mainAction);
  if(tg.BackButton) tg.BackButton.onClick(()=>{ if(sheetOpen) closeSheet(); else if(curStore) goHome(); });
}

/* ---------------- INIT ---------------- */
renderHome();updateNav();
</script>
</body>
</html>
