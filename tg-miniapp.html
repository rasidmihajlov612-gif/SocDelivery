<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SOC° delivery — mini app</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000; --panel:#0a1f15; --line:#16361f; --green:#1e7a45; --green2:#2ea35c;
    --ink:#fff; --muted:#7e8f85; --radius:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--ink)}
  body{font-family:'Inter',sans-serif;font-weight:300;padding-bottom:24px}
  button{font-family:inherit;cursor:pointer;border:none;color:inherit}
  .wrap{max-width:560px;margin:0 auto;padding:0 14px}
  h1,h2,h3,.logo{font-family:'Unbounded',sans-serif}
  .mono{font-family:'JetBrains Mono',monospace}

  .top{display:flex;align-items:center;gap:10px;padding:14px 2px 10px}
  .logo{font-weight:900;font-size:22px;text-transform:uppercase}
  .logo .dot{color:var(--green2)}
  .addr{margin-left:auto;font-size:11px;color:var(--muted);text-align:right;font-family:'JetBrains Mono';line-height:1.3}
  .addr b{color:#fff;display:block;font-size:12px;font-weight:700}

  .hero{font-family:'Unbounded';font-weight:900;text-transform:uppercase;font-size:26px;line-height:.98;margin:4px 2px}
  .hero .g{color:var(--green2)}
  .sub{color:var(--muted);font-size:13px;margin:4px 2px 16px}

  .rcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;cursor:pointer;display:flex;align-items:stretch}
  .rcard:active{transform:scale(.99)}
  .rcard .cov{width:92px;display:flex;align-items:center;justify-content:center;font-size:42px;flex:0 0 auto;position:relative}
  .rcard .closed{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono';font-size:11px;color:#ff6b6b;font-weight:700}
  .rcard .b{padding:12px 14px;flex:1}
  .rcard .nm{font-family:'Unbounded';font-weight:700;font-size:16px}
  .rcard .ds{color:var(--muted);font-size:12px;margin:2px 0 8px}
  .rcard .ft{display:flex;gap:12px;font-family:'JetBrains Mono';font-size:11px;color:#9fb0a6}
  .rcard .ft .st{color:var(--green2);font-weight:700}

  .rhead{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin:6px 0 14px}
  .rhead .ic{font-size:42px}
  .rhead h2{margin:0;font-size:20px;text-transform:uppercase}
  .rhead .m{font-family:'JetBrains Mono';font-size:11px;color:#9fb0a6;margin-top:4px;display:flex;gap:12px}
  .rhead .m .st{color:var(--green2);font-weight:700}

  .cats{display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none;position:sticky;top:0;background:#000;z-index:10;padding-top:6px}
  .cats::-webkit-scrollbar{display:none}
  .cat{flex:0 0 auto;padding:7px 13px;border-radius:999px;background:var(--panel);color:#9fb0a6;font-size:12px;font-weight:600;border:1px solid var(--line);font-family:'JetBrains Mono'}
  .cat.on{background:var(--green);color:#fff;border-color:var(--green)}

  .catsec h3{font-size:16px;text-transform:uppercase;margin:12px 2px 10px;font-weight:700}
  .dish{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:10px 12px;margin-bottom:8px}
  .dish .e{font-size:34px;flex:0 0 auto}
  .dish .info{flex:1;min-width:0}
  .dish .n{font-size:14px;font-weight:600;line-height:1.2}
  .dish .w{font-size:11px;color:var(--muted);font-family:'JetBrains Mono';margin:2px 0}
  .dish .p{font-family:'JetBrains Mono';font-weight:700;font-size:14px}
  .add{width:36px;height:36px;border-radius:11px;background:var(--green);font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .stp{display:flex;align-items:center;gap:5px;background:var(--green);border-radius:11px;padding:3px;flex:0 0 auto}
  .stp button{width:28px;height:30px;border-radius:8px;background:rgba(0,0,0,.25);font-size:17px;font-weight:700}
  .stp span{min-width:16px;text-align:center;font-weight:700;font-family:'JetBrains Mono'}

  .back{display:inline-flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);padding:7px 13px;border-radius:999px;font-family:'JetBrains Mono';font-size:12px;color:#9fb0a6;margin:8px 0 2px}

  /* sheet */
  .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none}
  .sheet-bg.on{display:block}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:101;background:#070f0a;border:1px solid var(--line);border-radius:20px 20px 0 0;max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:.25s;max-width:560px;margin:0 auto}
  .sheet.on{transform:translateY(0)}
  .sheet-h{position:sticky;top:0;background:#070f0a;padding:16px 16px 8px;display:flex;align-items:center}
  .sheet-h b{font-size:17px;font-family:'Unbounded';text-transform:uppercase}
  .sheet-h .x{margin-left:auto;width:32px;height:32px;border-radius:50%;background:var(--panel);border:1px solid var(--line);font-size:17px}
  .sheet-body{padding:0 16px calc(24px + env(safe-area-inset-bottom))}
  .li{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:9px 11px;margin-bottom:7px}
  .li .e{font-size:28px}
  .li .info{flex:1}
  .li .n{font-weight:600;font-size:13px}
  .li .p{font-size:11px;color:var(--muted);font-family:'JetBrains Mono'}
  .field{width:100%;padding:12px 13px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:#fff;font-size:15px;margin-bottom:9px;font-family:'Inter'}
  .field::placeholder{color:#5e6f65}
  .pay{display:flex;gap:8px;margin-bottom:12px}
  .pay button{flex:1;padding:11px;border-radius:12px;background:var(--panel);border:1px solid var(--line);font-weight:600;font-size:13px;color:#9fb0a6}
  .pay button.on{border-color:var(--green2);color:#fff;background:#0c2a1c}
  .summary{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px;margin-bottom:6px;font-size:13px;font-family:'JetBrains Mono'}
  .summary .r{display:flex;justify-content:space-between;padding:3px 0;color:#9fb0a6}
  .summary .r.total{font-weight:700;font-size:16px;color:#fff;border-top:1px solid var(--line);margin-top:5px;padding-top:8px}
  .hint{font-size:12px;margin:2px 2px 10px;font-family:'JetBrains Mono'}

  /* fallback bottom button (when not in Telegram) */
  .fakebtn{position:fixed;left:0;right:0;bottom:0;z-index:90;max-width:560px;margin:0 auto;padding:10px 14px calc(10px + env(safe-area-inset-bottom));display:none}
  .fakebtn.on{display:block}
  .fakebtn button{width:100%;padding:15px;border-radius:13px;background:var(--green);color:#fff;font-weight:700;font-size:15px;font-family:'JetBrains Mono';text-transform:uppercase;letter-spacing:.04em}

  .done{text-align:center;padding:50px 16px}
  .done .big{font-size:60px}
  .done h2{font-size:22px;text-transform:uppercase;margin:14px 0 6px}
  .done p{color:var(--muted);font-size:14px}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:11px 16px;border-radius:11px;font-size:13px;z-index:200;opacity:0;transition:.25s;pointer-events:none;font-family:'JetBrains Mono';text-align:center;max-width:88%}
  .toast.on{opacity:1}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo">SOC<span class="dot">°</span></div>
    <div class="addr">Доставка на<b>ул. Центральная, 12</b></div>
  </div>

  <div id="home">
    <div class="hero">Жрать <span class="g">хочется</span> сейчас</div>
    <div class="sub">Выбирай заведение — привезём за 30–40 минут.</div>
    <div id="rlist"></div>
  </div>

  <div id="menu" style="display:none">
    <button class="back" onclick="goHome()">← Все заведения</button>
    <div class="rhead" id="rhead"></div>
    <div class="cats" id="cats"></div>
    <div id="mlist"></div>
  </div>

  <div id="done" style="display:none" class="done">
    <div class="big">🔥</div>
    <h2 id="done-id">Заказ принят</h2>
    <p id="done-txt"></p>
    <button class="back" style="margin-top:18px" onclick="goHome()">← В меню</button>
  </div>
</div>

<div class="sheet-bg" id="sheet-bg" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-h"><b id="sheet-title">Корзина</b><button class="x" onclick="closeSheet()">✕</button></div>
  <div class="sheet-body" id="sheet-body"></div>
</div>

<div class="fakebtn" id="fakebtn"><button id="fakebtn-b" onclick="mainAction()"></button></div>
<div class="toast" id="toast"></div>

<script>
/* ---------------- TELEGRAM ---------------- */
const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
const inTG = !!(tg && tg.initData !== undefined && tg.platform && tg.platform!=='unknown');
if(tg){ tg.ready(); tg.expand(); try{tg.setHeaderColor('#000000'); tg.setBackgroundColor('#000000');}catch(e){} }
function haptic(t='light'){ try{ if(tg&&tg.HapticFeedback) tg.HapticFeedback.impactOccurred(t);}catch(e){} }
function notify(t='success'){ try{ if(tg&&tg.HapticFeedback) tg.HapticFeedback.notificationOccurred(t);}catch(e){} }

/* ---------------- DATA ---------------- */
const STORES=[
 {id:'burg',name:'Котлета',icon:'🍔',cov:'#3a2410',ds:'Бургеры на углях',rating:4.8,time:'25–35',min:600},
 {id:'sushi',name:'Тунец',icon:'🍣',cov:'#10243a',ds:'Роллы и сеты',rating:4.7,time:'30–40',min:800},
 {id:'pizza',name:'Печь',icon:'🍕',cov:'#3a1010',ds:'Пицца на дровах',rating:4.9,time:'30–45',min:700},
 {id:'gruz',name:'Сациви',icon:'🥟',cov:'#2a1a3a',ds:'Хинкали, хачапури',rating:4.8,time:'35–45',min:900},
 {id:'cof',name:'Кофеин',icon:'☕',cov:'#241a10',ds:'Кофе и завтраки',rating:4.6,time:'15–25',min:400,closed:true},
];
const PRODUCTS=[
 {id:1,s:'burg',c:'Бургеры',e:'🍔',n:'Чизбургер Котлета',w:'320 г',p:390},
 {id:2,s:'burg',c:'Бургеры',e:'🥓',n:'Бекон Дабл',w:'420 г',p:520},
 {id:3,s:'burg',c:'Бургеры',e:'🍗',n:'Чикен Краш',w:'300 г',p:360},
 {id:4,s:'burg',c:'Закуски',e:'🍟',n:'Картофель фри',w:'150 г',p:160},
 {id:5,s:'burg',c:'Закуски',e:'🧅',n:'Луковые кольца',w:'140 г',p:190},
 {id:6,s:'burg',c:'Напитки',e:'🥤',n:'Лимонад',w:'400 мл',p:150},
 {id:10,s:'sushi',c:'Роллы',e:'🍣',n:'Филадельфия',w:'8 шт',p:520},
 {id:11,s:'sushi',c:'Роллы',e:'🍣',n:'Калифорния',w:'8 шт',p:460},
 {id:12,s:'sushi',c:'Роллы',e:'🔥',n:'Запечённый с угрём',w:'8 шт',p:560},
 {id:13,s:'sushi',c:'Сеты',e:'🍱',n:'Сет Тунец',w:'32 шт',p:1490},
 {id:14,s:'sushi',c:'Сеты',e:'🍱',n:'Сет Дрифт',w:'24 шт',p:1190},
 {id:20,s:'pizza',c:'Пицца',e:'🍕',n:'Маргарита',w:'33 см',p:520},
 {id:21,s:'pizza',c:'Пицца',e:'🍕',n:'Пепперони',w:'33 см',p:620},
 {id:22,s:'pizza',c:'Пицца',e:'🍄',n:'Четыре сыра',w:'33 см',p:680},
 {id:23,s:'pizza',c:'Закуски',e:'🥖',n:'Чесночный хлеб',w:'180 г',p:190},
 {id:30,s:'gruz',c:'Хинкали',e:'🥟',n:'Хинкали с мясом',w:'5 шт',p:350},
 {id:31,s:'gruz',c:'Хинкали',e:'🥟',n:'Хинкали с сыром',w:'5 шт',p:330},
 {id:32,s:'gruz',c:'Хачапури',e:'🫓',n:'Аджарский',w:'400 г',p:420},
 {id:40,s:'cof',c:'Кофе',e:'☕',n:'Капучино',w:'300 мл',p:180},
];
const FEE=149, FREE_FROM=1500;

/* ---------------- STATE ---------------- */
let curStore=null, curCat='all', cart={}, cartStore=null, sheetOpen=false, pay='card';

/* ---------------- HELPERS ---------------- */
const $=id=>document.getElementById(id);
const money=v=>v.toLocaleString('ru-RU')+' ₽';
const prod=id=>PRODUCTS.find(p=>p.id===id);
const storeOf=id=>STORES.find(s=>s.id===id);
const cnt=()=>Object.values(cart).reduce((a,b)=>a+b,0);
const total=()=>Object.entries(cart).reduce((a,[id,q])=>a+prod(+id).p*q,0);
function toast(t){const e=$('toast');e.innerHTML=t;e.classList.add('on');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('on'),2200);}
function confirmSwap(msg,cb){ if(tg&&tg.showConfirm){tg.showConfirm(msg,ok=>{if(ok)cb();});} else { if(confirm(msg))cb(); } }

/* ---------------- HOME ---------------- */
function renderHome(){
  $('rlist').innerHTML=STORES.map(s=>`
    <div class="rcard" onclick="${s.closed?'':`openStore('${s.id}')`}">
      <div class="cov" style="background:${s.cov}">${s.icon}${s.closed?'<span class="closed">ЗАКРЫТО</span>':''}</div>
      <div class="b"><div class="nm">${s.name}</div><div class="ds">${s.ds}</div>
        <div class="ft"><span class="st">★ ${s.rating}</span><span>${s.time} мин</span><span>от ${s.min} ₽</span></div></div>
    </div>`).join('');
}
function openStore(id){haptic();curStore=id;curCat='all';
  $('home').style.display='none';$('done').style.display='none';$('menu').style.display='block';
  window.scrollTo(0,0);renderRhead();renderCats();renderMenu();updateNav();
}
function goHome(){haptic();curStore=null;
  $('menu').style.display='none';$('done').style.display='none';$('home').style.display='block';
  window.scrollTo(0,0);updateNav();
}
function renderRhead(){const s=storeOf(curStore);
  $('rhead').innerHTML=`<div class="ic">${s.icon}</div><div><h2>${s.name}</h2>
    <div class="m"><span class="st">★ ${s.rating}</span><span>${s.time} мин</span><span>мин. ${s.min} ₽</span></div></div>`;
}
function renderCats(){const cats=['all',...new Set(PRODUCTS.filter(p=>p.s===curStore).map(p=>p.c))];
  $('cats').innerHTML=cats.map(c=>`<div class="cat ${c===curCat?'on':''}" onclick="pickCat('${c}')">${c==='all'?'Всё меню':c}</div>`).join('');
}
function pickCat(c){haptic();curCat=c;renderCats();renderMenu();}
function renderMenu(){
  const cats=curCat==='all'?[...new Set(PRODUCTS.filter(p=>p.s===curStore).map(p=>p.c))]:[curCat];
  $('mlist').innerHTML=cats.map(cat=>{
    const list=PRODUCTS.filter(p=>p.s===curStore&&p.c===cat);
    return `<div class="catsec"><h3>${cat}</h3>${list.map(dishRow).join('')}</div>`;
  }).join('');
}
function dishRow(p){const q=cart[p.id]||0;
  const ctrl=q>0?`<div class="stp"><button onclick="chg(${p.id},-1)">−</button><span>${q}</span><button onclick="chg(${p.id},1)">+</button></div>`
    :`<button class="add" onclick="chg(${p.id},1)">+</button>`;
  return `<div class="dish"><div class="e">${p.e}</div>
    <div class="info"><div class="n">${p.n}</div><div class="w">${p.w}</div><div class="p">${money(p.p)}</div></div>${ctrl}</div>`;
}
function chg(id,d){const p=prod(id);haptic();
  if(d>0&&cartStore&&cartStore!==p.s&&cnt()>0){
    confirmSwap('В корзине заказ из «'+storeOf(cartStore).name+'». Очистить и начать заново?',()=>{cart={};cart[id]=1;cartStore=p.s;afterChg();});
    return;
  }
  cart[id]=(cart[id]||0)+d; if(cart[id]<=0) delete cart[id];
  cartStore=cnt()>0?p.s:null; afterChg();
}
function afterChg(){renderMenu();if(sheetOpen)renderSheet();updateNav();}

/* ---------------- SHEET ---------------- */
function openSheet(){if(cnt()===0)return;haptic();sheetOpen=true;renderSheet();
  $('sheet-bg').classList.add('on');$('sheet').classList.add('on');updateNav();}
function closeSheet(){sheetOpen=false;$('sheet-bg').classList.remove('on');$('sheet').classList.remove('on');updateNav();}
function renderSheet(){
  if(cnt()===0){closeSheet();return;}
  const st=storeOf(cartStore);
  const items=Object.entries(cart).map(([id,q])=>{const p=prod(+id);
    return `<div class="li"><div class="e">${p.e}</div><div class="info"><div class="n">${p.n}</div><div class="p">${money(p.p)} · ${p.w}</div></div>
      <div class="stp"><button onclick="chg(${p.id},-1)">−</button><span>${q}</span><button onclick="chg(${p.id},1)">+</button></div></div>`;}).join('');
  const sub=total(), fee=sub>=FREE_FROM?0:FEE, belowMin=sub<st.min;
  const hint=belowMin?`<div class="hint" style="color:#ff6b6b">До минимального заказа ещё ${money(st.min-sub)}</div>`
    :(sub<FREE_FROM?`<div class="hint" style="color:var(--muted)">До бесплатной доставки ${money(FREE_FROM-sub)}</div>`:'');
  $('sheet-title').textContent=st.name;
  $('sheet-body').innerHTML=`${items}${hint}
    <input class="field" id="f-name" placeholder="Имя" value="${tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user?tg.initDataUnsafe.user.first_name||'':''}">
    <input class="field" id="f-phone" placeholder="Телефон" inputmode="tel">
    <input class="field" id="f-addr" placeholder="Адрес доставки" value="ул. Центральная, 12, кв. ">
    <input class="field" id="f-note" placeholder="Комментарий курьеру (необязательно)">
    <div class="pay"><button class="${pay==='card'?'on':''}" onclick="setPay('card')">💳 Картой</button>
      <button class="${pay==='cash'?'on':''}" onclick="setPay('cash')">💵 Наличными</button></div>
    <div class="summary"><div class="r"><span>Блюда</span><span>${money(sub)}</span></div>
      <div class="r"><span>Доставка</span><span>${fee===0?'Бесплатно':money(fee)}</span></div>
      <div class="r total"><span>Итого</span><span>${money(sub+fee)}</span></div></div>`;
}
function setPay(p){haptic();pay=p;renderSheet();}

/* ---------------- NAV / MAIN BUTTON ---------------- */
function mainAction(){ if(sheetOpen) placeOrder(); else openSheet(); }
function updateNav(){
  const c=cnt(), sub=total();
  // BackButton
  if(tg&&tg.BackButton){
    if(sheetOpen||curStore){tg.BackButton.show();} else {tg.BackButton.hide();}
  }
  // MainButton / fallback
  let label='', show=false, color='#1e7a45';
  if(sheetOpen && c>0){
    const st=storeOf(cartStore), fee=sub>=FREE_FROM?0:FEE, below=sub<st.min;
    show=true;
    label= below ? 'ДОБЕРИ ДО '+money(st.min) : 'ЗАКАЗАТЬ · '+money(sub+fee);
    color= below ? '#555' : '#1e7a45';
  } else if(c>0 && !sheetOpen){
    show=true; label='КОРЗИНА · '+money(sub);
  }
  if(tg&&tg.MainButton){
    if(show){tg.MainButton.setParams({text:label,color:color,text_color:'#ffffff',is_active:true});tg.MainButton.show();}
    else tg.MainButton.hide();
  }
  // browser fallback button
  const fb=$('fakebtn');
  if(!inTG && show){fb.classList.add('on');$('fakebtn-b').textContent=label;$('fakebtn-b').style.background=color;}
  else fb.classList.remove('on');
}

/* ---------------- ORDER ---------------- */
function placeOrder(){
  const st=storeOf(cartStore), sub=total();
  if(sub<st.min){toast('Добери до минимального заказа');notify('error');return;}
  const name=($('f-name')?.value||'').trim(), phone=($('f-phone')?.value||'').trim(), addr=($('f-addr')?.value||'').trim();
  if(!name||phone.length<5||addr.length<6){toast('Заполни имя, телефон и адрес');notify('error');return;}
  const fee=sub>=FREE_FROM?0:FEE;
  const order={
    type:'order', store:cartStore, store_name:st.name,
    items:Object.entries(cart).map(([id,q])=>({id:+id,name:prod(+id).n,qty:q,price:prod(+id).p})),
    name, phone, addr, note:($('f-note')?.value||'').trim(), pay, subtotal:sub, fee, total:sub+fee,
  };
  notify('success');
  // send to bot if inside Telegram, else simulate
  if(inTG && tg.sendData){ tg.sendData(JSON.stringify(order)); return; }
  const oid='#'+Math.floor(2000+Math.random()*8000);
  cart={};cartStore=null;sheetOpen=false;
  $('sheet-bg').classList.remove('on');$('sheet').classList.remove('on');
  $('home').style.display='none';$('menu').style.display='none';$('done').style.display='block';
  $('done-id').textContent='Заказ '+oid+' принят';
  $('done-txt').textContent=st.name+' · '+money(order.total)+' · доставим за '+st.time+' мин';
  updateNav();window.scrollTo(0,0);
}

/* ---------------- WIRE TELEGRAM BUTTONS ---------------- */
if(tg){
  if(tg.MainButton) tg.MainButton.onClick(mainAction);
  if(tg.BackButton) tg.BackButton.onClick(()=>{ if(sheetOpen) closeSheet(); else if(curStore) goHome(); });
}

/* ---------------- INIT ---------------- */
renderHome();updateNav();
</script>
</body>
